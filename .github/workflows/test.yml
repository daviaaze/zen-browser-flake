name: Build and Test

on:
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        run: nix build --print-build-logs

      - name: Verify version
        run: |
          EXPECTED=$(grep -oP 'version = "\K[^"]+' flake.nix)
          echo "Expected version: $EXPECTED"

          APP_VERSION=$(grep "^Version=" result/bin/application.ini 2>/dev/null | cut -d= -f2)
          echo "Built version: $APP_VERSION"

          if [ -z "$APP_VERSION" ]; then
            echo "WARNING: Could not read version from application.ini, skipping version check"
          elif [ "$APP_VERSION" != "$EXPECTED" ]; then
            echo "ERROR: Version mismatch! Expected $EXPECTED, got $APP_VERSION"
            exit 1
          else
            echo "OK: version matches ($APP_VERSION)"
          fi

      - name: Auto-merge if this is a bot update PR
        if: startsWith(github.head_ref, 'update-zen-browser-')
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
        run: |
          gh pr merge --merge ${{ github.event.pull_request.number }}
