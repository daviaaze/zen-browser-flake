name: Update Zen Browser

on:
  schedule:
    - cron: '0 3 * * 1'  # Runs weekly on Monday at 3 AM UTC
  workflow_dispatch:  # Allows manual triggering

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check and Update Zen Browser
        id: update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch latest version
          LATEST=$(gh release view --repo zen-browser/desktop --json tagName --jq .tagName | sed 's/^v//')
          CURRENT=$(grep -oP 'version = "\K[^"]+' flake.nix)

          echo "Current: $CURRENT"
          echo "Latest:  $LATEST"

          if [ "$LATEST" == "$CURRENT" ]; then
            echo "Already up to date."
            echo "update_needed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Updating $CURRENT -> $LATEST ..."

          # Compute sha256 of the new tarball (SRI format, as used by pkgs.fetchurl)
          URL="https://github.com/zen-browser/desktop/releases/download/${LATEST}/zen.linux-x86_64.tar.xz"
          HASH=$(nix-prefetch-url --type sha256 "$URL" 2>/dev/null)
          NEW_SHA256=$(nix hash to-sri --type sha256 "$HASH")

          echo "New sha256: $NEW_SHA256"

          # Update version string in flake.nix
          sed -i "s/version = \"$CURRENT\"/version = \"$LATEST\"/" flake.nix

          # Update sha256 hash in flake.nix
          sed -i "s|sha256 = \"sha256-[^\"]*\"|sha256 = \"$NEW_SHA256\"|" flake.nix

          echo "update_needed=true" >> $GITHUB_OUTPUT
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.update.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: Update Zen Browser to ${{ steps.update.outputs.latest_version }}'
          title: 'chore: Update Zen Browser to ${{ steps.update.outputs.latest_version }}'
          body: |
            Automated update of Zen Browser.

            - **Previous version**: ${{ steps.update.outputs.current_version }}
            - **New version**: ${{ steps.update.outputs.latest_version }}

            The build will be tested automatically. This PR will be merged once all checks pass.
          branch: update-zen-browser-${{ steps.update.outputs.latest_version }}
          delete-branch: true
